name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python test suite
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up pinned Node runtime
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v4
        with:
          node-version: 22.12.0
          package-manager-cache: false

      - name: Install pinned uv
        id: setup-uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: 0.10.12
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.11

      - name: Install dependencies
        run: uv sync --frozen --python 3.12.11

      - name: Build verifier consumed by Python integration tests
        working-directory: packages/verify
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Test deterministic dashboard build identity
        working-directory: dashboard
        run: |
          set -euo pipefail
          npm ci
          npm run test:unit

      - name: Install locked Chromium test runtime
        working-directory: scripts/g13-browser-runtime
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          PLAYWRIGHT_BROWSERS_PATH=0 \
            node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run tests
        run: >-
          uv run --frozen --isolated --python 3.12.11
          python -m pytest -q
