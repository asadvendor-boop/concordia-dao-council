name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      # Build @concordia-dao/verify so the proof-registry tests EXECUTE in CI
      # rather than skip (Codex correction C3: CI/release must build the
      # verifier and run those tests — the skip is for bare local clones only).
      - name: Build packages/verify
        working-directory: packages/verify
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: uv run pytest -q
